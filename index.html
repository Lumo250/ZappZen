  // Versione semplificata: salta il controllo e permette sempre l’accesso
  async function promptLicenseAndCheck() {
    return true;
  }

  window.addEventListener("load", async () => {
    const ok = await promptLicenseAndCheck();
    if (!ok) {
      document.body.innerHTML = "<h2>Accesso negato. Licenza non valida.</h2>";
      return;
    }

    const savedLocalList = localStorage.getItem("zappzen_local_playlist");
    if (savedLocalList) {
      parseM3U(savedLocalList);
      showingFavorites = false;
      updateButtons();
    } else {
      loadRemoteM3U('https://lumo250.github.io/ZappZen/tivustream_list.m3u');
    }
  });
</script>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service worker registered.', reg))
          .catch(err => console.error('Service worker error:', err));
      });
    }

  <title>ZappZen - by AG Design</title>
  <style>
    body {
      font-family: sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 1rem;
    }
    h1 {
      text-align: center;
    }
    #controls {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      justify-content: center;
    }
    input[type='file'], input[type='text'] {
      flex: 1 1 auto;
      min-width: 80px; 
      max-width: 300px; /* Limite massimo */     
      padding: 0.4rem;
      font-size: 1rem;
    }
    button {
      padding: 0.4rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      background: #333;
      border: none;
      color: #fff;
      border-radius: 5px;
      user-select: none;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.5rem;
      border-bottom: 1px solid #444;
      cursor: pointer;
    }
    li:hover {
      background: #333;
    }
    img.logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 5px;
      background: #000;
      flex-shrink: 0;
    }
    .favorite-star {
      font-size: 1.5rem;
      color: gold;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .favorite-star.inactive {
      color: #555;
    }
    video {
      width: 100%;
      max-height: 60vh;
      margin-top: 1rem;
      background: #000;
    }
    #playerContainer {
      display: none;
      text-align: center;
    }
    #channelListContainer {
      display: block;
    }

.active-channel {
  background: #444 !important;
}

.group-header {
  pointer-events: none; /* rende il titolo gruppo non cliccabile */
  user-select: none; /* non selezionabile */
  font-weight: bold;
  background-color: #222;
  border-bottom: 2px solid #555;
  padding: 0.5rem 1rem;
  cursor: default;
}

<body>

<h1>
    <img
    src="favicon-32x32.png"
    alt="ZappZen logo"
    id="logoButton"
    style="height: 40px; margin-right: 10px; vertical-align: middle; cursor: pointer;"
    title="Carica lista M3U da file"
  />
  ZappZen by AG Design
</h1>
  
  
  <div id="controls">
    <input type="file" id="fileInput" accept=".m3u,.m3u8" style="display: none;" />
    <input type="text" id="searchInput" placeholder="Cerca canale..." />
    <button id="showAllBtn" disabled>Tutti</button>
    <button id="showFavBtn" disabled>Preferiti</button>
     <button id="resetListBtn" title="Ricarica lista predefinita">♻️</button>
  </div>

  <div id="channelListContainer">
    <ul id="channelList"></ul>
  </div>

  <div id="playerContainer">
      <div id="currentChannelInfo" style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
    <img id="currentChannelLogo" src="" alt="Logo canale" style="height:40px; width:40px; object-fit:contain; border-radius:5px; background:#000;">
<span id="currentChannelName" style="font-size:0.9rem; color: #ccc;"></span>
  </div>
  <video id="player" controls autoplay></video><br />

  <div style="margin-top: 10px; display: flex; justify-content: center; gap: 10px;">
    <button id="prevBtn">Precedente</button>
    <button id="backButton" onclick="showChannelList()">Torna alla lista</button>
    <button id="nextBtn">Successivo</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    let channels = [];
    let groups = [];
    let showingFavorites = false;
    let currentChannelIndex = -1;

    document.getElementById('fileInput').addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        const text = e.target.result;
        localStorage.setItem('zappzen_local_playlist', text);
        parseM3U(text);
        showingFavorites = false;
        updateButtons();
      };
      reader.readAsText(file);
    });

    document.getElementById('logoButton').addEventListener('click', () => {
      document.getElementById('fileInput').click();
    });

    document.getElementById('showAllBtn').addEventListener('click', () => {
      showingFavorites = false;
      renderChannelList();
      updateButtons();
    });

    document.getElementById('showFavBtn').addEventListener('click', () => {
      showingFavorites = true;
      renderChannelList();
      updateButtons();
    });

    document.getElementById('resetListBtn').addEventListener('click', () => {
      localStorage.removeItem('zappzen_local_playlist');
      showingFavorites = false;  // RESETTO la modalità preferiti
      loadRemoteM3U('https://lumo250.github.io/ZappZen/tivustream_list.m3u');
    });

    document.getElementById('searchInput').addEventListener('input', () => {
      renderChannelList();
    });

    async function loadRemoteM3U(url) {
      try {
        const res = await fetch(url);
        const text = await res.text();
        parseM3U(text);
        showingFavorites = false;
        updateButtons();
      } catch (e) {
        alert('Failed to load remote playlist: ' + e.message);
      }
    }

    function parseM3U(text) {
      groups = [];  // array di gruppi { groupName: string, channels: array }
      let currentGroup = { groupName: "Senza gruppo", channels: [] };

      const lines = text.split('\n');

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();

        // Righe di gruppo: tipicamente #EXTINF senza URL valido sotto, o riga che non inizia con #EXTINF e non è URL
        if (line.startsWith('#EXTINF')) {
          // Estraggo nome e logo
          const nameMatch = line.match(/,(.*)/);
          const name = nameMatch ? nameMatch[1].trim() : 'Unnamed Channel';
          const logoMatch = line.match(/tvg-logo="(.*?)"/);
          const logo = logoMatch ? logoMatch[1] : null;

          const streamUrl = lines[i + 1]?.trim();

          // Se dopo #EXTINF NON c'è un URL valido, è un titolo di gruppo
          if (!streamUrl || !streamUrl.startsWith('http')) {
            // Considero questa riga come titolo gruppo
            if (currentGroup.channels.length > 0) {
              groups.push(currentGroup);
            }
            currentGroup = { groupName: name, channels: [] };
          } else {
            // Canale normale
            currentGroup.channels.push({ name, logo, url: streamUrl });
            i++; // salto la riga url, già usata
          }
        }
      }

      // Pusho l'ultimo gruppo
      if (currentGroup.channels.length > 0 || currentGroup.groupName !== "Senza gruppo") {
        groups.push(currentGroup);
      }

      // Reset canali piatti se li usi
      channels = [];
      groups.forEach(g => {
        channels.push(...g.channels);
      });

      renderChannelList();
    }

    function getFavorites() {
      const fav = localStorage.getItem('m3uFavorites');
      return fav ? JSON.parse(fav) : [];
    }

    function saveFavorites(favList) {
      localStorage.setItem('m3uFavorites', JSON.stringify(favList));
    }

    function isFavorite(url) {
      return getFavorites().includes(url);
    }

    function toggleFavorite(url) {
      let fav = getFavorites();
      if (fav.includes(url)) {
        fav = fav.filter(u => u !== url);
      } else {
        fav.push(url);
      }
      saveFavorites(fav);
      renderChannelList();
    }

    function renderChannelList() {
      const list = document.getElementById('channelList');
      const search = document.getElementById('searchInput').value.toLowerCase();
      list.innerHTML = '';

      let displayGroups = groups.map(g => {
        // filtro i canali per ricerca e preferiti
        const filteredChannels = showingFavorites
          ? g.channels.filter(ch => isFavorite(ch.url))
          : g.channels;

        const searchFilteredChannels = filteredChannels.filter(ch => ch.name.toLowerCase().includes(search));

        return { groupName: g.groupName, channels: searchFilteredChannels };
      });

      // Rimuovo i gruppi senza canali dopo filtro
      displayGroups = displayGroups.filter(g => g.channels.length > 0);

      displayGroups.forEach(({ groupName, channels }) => {
        // Intestazione gruppo
        const groupHeader = document.createElement('li');
        groupHeader.textContent = groupName;
        groupHeader.classList.add('group-header');
        list.appendChild(groupHeader);

        // Canali
        channels.forEach(({ name, logo, url }) => {
          const li = document.createElement('li');
          if (url === window.currentChannelUrl) {
            li.classList.add('active-channel');
          }
          li.setAttribute('data-url', url);

          if (logo) {
            const img = document.createElement('img');
            img.src = logo;
            img.className = 'logo';
            li.appendChild(img);
          }

          const nameSpan = document.createElement('span');
          nameSpan.textContent = name;
          nameSpan.style.flexGrow = '1';
          nameSpan.style.userSelect = 'none';
          nameSpan.style.cursor = 'pointer';
          nameSpan.onclick = () => playStream(url);
          li.appendChild(nameSpan);

          const star = document.createElement('span');
          star.className = 'favorite-star ' + (isFavorite(url) ? '' : 'inactive');
          star.innerHTML = '★';
          star.title = isFavorite(url) ? 'Rimuovi dai preferiti' : 'Aggiungi ai preferiti';
          star.onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(url);
          };
          li.appendChild(star);

          list.appendChild(li);
        });
      });

      updateButtons();
    }

    function updateButtons() {
      document.getElementById('showAllBtn').disabled = !showingFavorites;
      document.getElementById('showFavBtn').disabled = showingFavorites;
    }

    function playStream(url) {
      window.currentChannelUrl = url;  // memorizza l'URL del canale attuale  
      currentChannelIndex = channels.findIndex(ch => ch.url === url);
      if (currentChannelIndex === -1) return;

      const channel = channels[currentChannelIndex];

      document.getElementById('currentChannelLogo').src = channel.logo || '';
      document.getElementById('currentChannelName').textContent = channel.name;

      document.getElementById('channelListContainer').style.display = 'none';
      document.getElementById('playerContainer').style.display = 'block';

      const video = document.getElementById('player');
      if (Hls.isSupported()) {
        if (window.hlsInstance) window.hlsInstance.destroy();
        const hls = new Hls();
        window.hlsInstance = hls;
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else alert('Your browser doesn’t support HLS.');

      updateNavButtons();
    }

    function updateNavButtons() {
      document.getElementById('prevBtn').disabled = currentChannelIndex <= 0;
      document.getElementById('nextBtn').disabled = currentChannelIndex >= channels.length - 1;
    }

    function showChannelList() {
      const video = document.getElementById('player');
      video.pause();
      video.removeAttribute('src');
      video.load();

      if (window.hlsInstance) {
        window.hlsInstance.destroy();
        window.hlsInstance = null;
      }

      document.getElementById('playerContainer').style.display = 'none';
      document.getElementById('channelListContainer').style.display = 'block';

      const targetLi = document.querySelector(`#channelList li[data-url="${window.currentChannelUrl}"]`);
      if (targetLi) {
        targetLi.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentChannelIndex > 0) {
        currentChannelIndex--;
        playStream(channels[currentChannelIndex].url);
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (currentChannelIndex < channels.length - 1) {
        currentChannelIndex++;
        playStream(channels[currentChannelIndex].url);
      }
    });

  </script>
</body>
</html>
