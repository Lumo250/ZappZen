<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service worker registered.', reg))
          .catch(err => console.error('Service worker error:', err));
      });
    }
  </script>
  <title>ZappZen - by AG Design</title>
  <style>
    body {
      font-family: sans-serif;
      background: #121212;
      color: #fff;
      margin: 0;
      padding: 1rem;
    }
    h1 {
      text-align: center;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      justify-content: center;
    }
    input[type='file'], input[type='text'] {
      padding: 0.4rem;
      font-size: 1rem;
    }
    button {
      padding: 0.4rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      background: #333;
      border: none;
      color: #fff;
      border-radius: 5px;
      user-select: none;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.5rem;
      border-bottom: 1px solid #444;
      cursor: pointer;
    }
    li:hover {
      background: #333;
    }
    img.logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 5px;
      background: #000;
      flex-shrink: 0;
    }
    .favorite-star {
      font-size: 1.5rem;
      color: gold;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .favorite-star.inactive {
      color: #555;
    }
    video {
      width: 100%;
      max-height: 60vh;
      margin-top: 1rem;
      background: #000;
    }
    #playerContainer {
      display: none;
      text-align: center;
    }
    #channelListContainer {
      display: block;
    }
    #backButton {
      margin-top: 10px;
      padding: 0.5rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      background: #333;
      border: none;
      color: #fff;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>ZappZen by AG Design</h1>
  <div id="controls">
    <input type="file" id="fileInput" accept=".m3u,.m3u8" />
    <input type="text" id="searchInput" placeholder="Cerca canale..." />
    <button id="showAllBtn" disabled>Tutti</button>
    <button id="showFavBtn" disabled>Preferiti</button>
  </div>

  <div id="channelListContainer">
    <ul id="channelList"></ul>
  </div>

  <div id="playerContainer">
    <video id="player" controls autoplay></video><br />
    <button id="backButton" onclick="showChannelList()">Torna alla lista</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    let channels = [];
    let showingFavorites = false;

    window.addEventListener('load', () => {
      loadRemoteM3U('https://lumo250.github.io/M3U-Stream/tivustream_list.m3u');
    });

    document.getElementById('fileInput').addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        const text = e.target.result;
        parseM3U(text);
        showingFavorites = false;
        updateButtons();
      };
      reader.readAsText(file);
    });

    document.getElementById('showAllBtn').addEventListener('click', () => {
      showingFavorites = false;
      renderChannelList();
      updateButtons();
    });

    document.getElementById('showFavBtn').addEventListener('click', () => {
      showingFavorites = true;
      renderChannelList();
      updateButtons();
    });

    document.getElementById('searchInput').addEventListener('input', () => {
      renderChannelList();
    });

    async function loadRemoteM3U(url) {
      try {
        const res = await fetch(url);
        const text = await res.text();
        parseM3U(text);
        showingFavorites = false;
        updateButtons();
      } catch (e) {
        alert('Failed to load remote playlist: ' + e.message);
      }
    }

    function parseM3U(text) {
      channels = [];
      const lines = text.split('\n');

      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith('#EXTINF')) {
          const nameMatch = lines[i].match(/,(.*)/);
          const name = nameMatch ? nameMatch[1].trim() : 'Unnamed Channel';
          const logoMatch = lines[i].match(/tvg-logo="(.*?)"/);
          const logo = logoMatch ? logoMatch[1] : null;
          const streamUrl = lines[i + 1]?.trim();
          if (streamUrl && streamUrl.startsWith('http')) {
            channels.push({ name, logo, url: streamUrl });
          }
        }
      }
      renderChannelList();
    }

    function getFavorites() {
      const fav = localStorage.getItem('m3uFavorites');
      return fav ? JSON.parse(fav) : [];
    }

    function saveFavorites(favList) {
      localStorage.setItem('m3uFavorites', JSON.stringify(favList));
    }

    function isFavorite(url) {
      return getFavorites().includes(url);
    }

    function toggleFavorite(url) {
      let fav = getFavorites();
      if (fav.includes(url)) {
        fav = fav.filter(u => u !== url);
      } else {
        fav.push(url);
      }
      saveFavorites(fav);
      renderChannelList();
    }

    function renderChannelList() {
      const list = document.getElementById('channelList');
      const search = document.getElementById('searchInput').value.toLowerCase();
      list.innerHTML = '';

      let displayChannels = showingFavorites
        ? channels.filter(ch => isFavorite(ch.url))
        : channels;

      displayChannels = displayChannels.filter(ch => ch.name.toLowerCase().includes(search));

      displayChannels.forEach(({ name, logo, url }) => {
        const li = document.createElement('li');

        if (logo) {
          const img = document.createElement('img');
          img.src = logo;
          img.className = 'logo';
          li.appendChild(img);
        }

        const nameSpan = document.createElement('span');
        nameSpan.textContent = name;
        nameSpan.style.flexGrow = '1';
        nameSpan.style.userSelect = 'none';
        nameSpan.style.cursor = 'pointer';
        nameSpan.onclick = () => playStream(url);
        li.appendChild(nameSpan);

        const star = document.createElement('span');
        star.className = 'favorite-star ' + (isFavorite(url) ? '' : 'inactive');
        star.innerHTML = '★';
        star.title = isFavorite(url) ? 'Rimuovi dai preferiti' : 'Aggiungi ai preferiti';
        star.onclick = (e) => {
          e.stopPropagation();
          toggleFavorite(url);
        };
        li.appendChild(star);

        list.appendChild(li);
      });

      updateButtons();
    }

    function updateButtons() {
      document.getElementById('showAllBtn').disabled = !showingFavorites;
      document.getElementById('showFavBtn').disabled = showingFavorites;
    }

    function playStream(url) {
      document.getElementById('channelListContainer').style.display = 'none';
      document.getElementById('playerContainer').style.display = 'block';

      const video = document.getElementById('player');
      if (Hls.isSupported()) {
        if (window.hlsInstance) {
          window.hlsInstance.destroy();
        }
        const hls = new Hls();
        window.hlsInstance = hls;
        hls.loadSource(url);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
      } else {
        alert('Your browser does not support HLS playback.');
      }
    }

    function showChannelList() {
      const video = document.getElementById('player');
      video.pause();
      video.removeAttribute('src');
      video.load();

      if (window.hlsInstance) {
        window.hlsInstance.destroy();
        window.hlsInstance = null;
      }

      document.getElementById('playerContainer').style.display = 'none';
      document.getElementById('channelListContainer').style.display = 'block';
    }
  </script>
</body>
</html>
